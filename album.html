<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Álbum Estrellas de Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --p-blue:#0046AD;--p-navy:#002B6E;--p-orange:#F7A800;--p-red:#E8231A;
  --blanco:#ffffff;--borde:rgba(255,255,255,0.12);--texto-suave:rgba(255,255,255,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#05174a;
  color:var(--blanco);
  font-family:'Barlow',sans-serif;
  min-height:100vh;
}

/* ── NAVBAR ─────────────────────────────────────────────── */
.navbar{
  position:sticky;top:0;z-index:100;
  background:rgba(0,43,110,.97);backdrop-filter:blur(16px);
  border-bottom:3px solid var(--p-orange);
  padding:.75rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.nav-left{display:flex;flex-direction:column;gap:.15rem;}
.nav-tienda{
  font-family:'Bebas Neue',sans-serif;font-size:1.3rem;
  letter-spacing:.06em;color:#fff;line-height:1;
}
.nav-region{
  font-family:'Barlow Condensed',sans-serif;font-size:.65rem;
  letter-spacing:.15em;text-transform:uppercase;color:var(--texto-suave);
}
.nav-center{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--p-orange);
}
.nav-right{display:flex;align-items:center;gap:1rem;}
.nav-progress{display:flex;align-items:center;gap:.6rem;}
.progress-label{
  font-family:'Barlow Condensed',sans-serif;font-size:.68rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--texto-suave);
  white-space:nowrap;
}
.progress-pct{
  font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--p-orange);
}
.progress-track{width:80px;height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--p-orange);border-radius:3px;transition:width .6s ease;}
.btn-logout{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.7);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.4rem .9rem;border-radius:20px;cursor:pointer;transition:all .18s;
}
.btn-logout:hover{background:var(--p-red);border-color:var(--p-red);color:#fff;}

/* ── HERO ───────────────────────────────────────────────── */
.hero{
  padding:2.5rem 1.5rem 2rem;
  background:linear-gradient(180deg,#001f5e 0%,#05174a 100%);
  border-bottom:1px solid var(--borde);
}
.hero-inner{max-width:1300px;margin:0 auto;}
.hero-top{
  display:flex;align-items:flex-end;justify-content:space-between;
  flex-wrap:wrap;gap:1.5rem;margin-bottom:1.5rem;
}
.hero-tienda{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2rem,5vw,3.5rem);
  letter-spacing:.04em;line-height:1;
}
.hero-region{
  font-family:'Barlow Condensed',sans-serif;font-weight:600;
  font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--p-orange);margin-top:.3rem;
}
.hero-fechas{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--texto-suave);margin-top:.15rem;
}

.hero-stats{display:flex;gap:1rem;flex-wrap:wrap;}
.hstat{
  background:rgba(255,255,255,.07);border:1px solid var(--borde);
  border-radius:12px;padding:.9rem 1.3rem;min-width:100px;text-align:center;
}
.hstat-num{
  font-family:'Bebas Neue',sans-serif;font-size:2rem;
  color:var(--p-orange);line-height:1;
}
.hstat-label{
  font-family:'Barlow Condensed',sans-serif;font-size:.6rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--texto-suave);
  margin-top:.2rem;
}

/* ── BARRA DE SEMANAS ───────────────────────────────────── */
.stats-bar-wrap{
  padding:.8rem 1.5rem;
  background:rgba(0,0,0,.25);border-bottom:1px solid var(--borde);
}
.stats-bar-inner{
  max-width:1300px;margin:0 auto;
  display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;
}
.stats-bar-label{
  font-family:'Barlow Condensed',sans-serif;font-size:.65rem;
  letter-spacing:.15em;text-transform:uppercase;color:var(--texto-suave);
  margin-right:.4rem;white-space:nowrap;
}
#statsBar{display:flex;gap:.5rem;flex-wrap:wrap;}
.mini-stat{
  display:flex;align-items:center;gap:.4rem;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:.3rem .7rem;cursor:pointer;transition:all .18s;
}
.mini-stat:hover{background:rgba(255,255,255,.12);}
.mini-num{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:#fff;
}
.mini-bar-wrap{width:40px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.mini-bar-fill{height:100%;background:var(--p-orange);border-radius:2px;}
.mini-pct{
  font-family:'Barlow Condensed',sans-serif;font-size:.68rem;
  color:var(--p-orange);font-weight:700;
}
.mini-stat.mini-futura .mini-bar-fill{background:rgba(255,255,255,.2);}
.mini-stat.mini-futura .mini-pct{color:var(--texto-suave);}

/* ── CONTENEDOR ÁLBUM ───────────────────────────────────── */
.album-wrap{max-width:1300px;margin:0 auto;padding:2rem 1.5rem 4rem;}

/* ── SECCIÓN SEMANA ─────────────────────────────────────── */
.semana-section{margin-bottom:3rem;}

.semana-header{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:.8rem;
  padding:.9rem 1.2rem;
  border-radius:12px 12px 0 0;
  border-left:4px solid var(--p-orange);
  background:rgba(255,255,255,.06);
  border-bottom:1px solid var(--borde);
  margin-bottom:.15rem;
}
.semana-section.semana-futura .semana-header{
  border-left-color:rgba(255,255,255,.2);
  background:rgba(255,255,255,.03);
}
.semana-section.semana-actual .semana-header{
  border-left-color:var(--p-orange);
  background:rgba(247,168,0,.08);
}
.semana-info{display:flex;align-items:baseline;gap:.8rem;flex-wrap:wrap;}
.semana-num{
  font-family:'Bebas Neue',sans-serif;font-size:1.6rem;
  letter-spacing:.06em;color:#fff;
}
.semana-nombre{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--texto-suave);
}
.semana-fechas{
  font-family:'Barlow',sans-serif;font-size:.72rem;
  color:rgba(255,255,255,.3);
}
.semana-meta{display:flex;align-items:center;gap:.8rem;}
.semana-badge{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;
  padding:.3rem .85rem;border-radius:20px;
}
.badge-pasada{background:rgba(100,210,100,.15);color:#6dd68a;border:1px solid rgba(100,210,100,.3);}
.badge-actual{background:rgba(247,168,0,.2);color:var(--p-orange);border:1px solid rgba(247,168,0,.4);}
.badge-futura{background:rgba(255,255,255,.07);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.12);}
.semana-counter{
  font-family:'Barlow Condensed',sans-serif;font-size:.72rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--texto-suave);
}

/* ── GRID DE TARJETAS ───────────────────────────────────── */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:.75rem;
  padding:1rem;
  background:rgba(0,0,0,.15);
  border-radius:0 0 12px 12px;
  border:1px solid var(--borde);border-top:none;
}

/* ── STICKER BASE ───────────────────────────────────────── */
.sticker{
  position:relative;
  border-radius:12px;overflow:hidden;
  display:flex;flex-direction:column;
  aspect-ratio:3/4;
  cursor:default;
  transition:transform .2s,box-shadow .2s;
}
.sticker:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 12px 32px rgba(0,0,0,.4);}

.sticker-inner{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:.6rem .4rem;position:relative;
}
.sticker-footer{
  padding:.5rem .4rem;text-align:center;
}

/* ── DESBLOQUEADO ───────────────────────────────────────── */
.sticker-desbloqueado{
  background:linear-gradient(145deg,#003a99 0%,#0053c8 50%,#1a6ef0 100%);
  border:2px solid rgba(247,168,0,.5);
  box-shadow:0 0 20px rgba(247,168,0,.15);
}
.sticker-shine{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 50%,rgba(255,255,255,.05) 100%);
  pointer-events:none;z-index:1;
}
.sticker-foto{
  width:68px;height:68px;border-radius:50%;
  border:3px solid var(--p-orange);
  overflow:hidden;background:rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
}
.sticker-foto img{width:100%;height:100%;object-fit:cover;}
.sticker-inicial{
  font-family:'Bebas Neue',sans-serif;font-size:2rem;
  color:var(--p-orange);line-height:1;
}
.sticker-badge-meta{
  margin-top:.4rem;
  background:var(--p-orange);color:#000;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:.6rem;letter-spacing:.1em;
  padding:.2rem .6rem;border-radius:20px;
}
.sticker-desbloqueado .sticker-nombre{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.72rem;letter-spacing:.04em;color:#fff;
  display:block;line-height:1.2;
}
.sticker-cargo{
  font-size:.6rem;color:rgba(255,255,255,.4);display:block;margin-top:.1rem;
}

/* ── EN CURSO (semana actual, pendiente) ────────────────── */
.sticker-en-curso{
  background:linear-gradient(145deg,#002060 0%,#003080 100%);
  border:2px solid rgba(247,168,0,.3);
}
.sticker-en-curso .sticker-nombre{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.72rem;color:rgba(255,255,255,.8);display:block;
}
.sticker-en-curso .sticker-status{
  font-size:.6rem;color:var(--p-orange);display:block;margin-top:.1rem;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase;
}
.pulse-ring{
  position:absolute;top:.6rem;right:.6rem;
  width:10px;height:10px;border-radius:50%;
  background:var(--p-orange);
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(247,168,0,.5);}
  50%{box-shadow:0 0 0 6px rgba(247,168,0,0);}
}

/* ── BLOQUEADO (no cumplió) ─────────────────────────────── */
.sticker-bloqueado{
  background:linear-gradient(145deg,#0d1a2e 0%,#15243d 100%);
  border:2px solid rgba(255,255,255,.08);
  opacity:.7;
}
.sticker-bloqueado .sticker-nombre{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.72rem;color:rgba(255,255,255,.45);display:block;
}
.sticker-bloqueado .sticker-status{
  font-size:.6rem;color:rgba(255,100,100,.6);display:block;margin-top:.1rem;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase;
}

/* ── FUTURO (semanas que no han llegado) ────────────────── */
.sticker-futura{
  background:linear-gradient(145deg,#080f1e 0%,#0d1830 100%);
  border:2px solid rgba(255,255,255,.05);
  opacity:.5;
}
.sticker-futura:hover{transform:none;box-shadow:none;}
.sticker-lock-icon{
  position:absolute;top:.5rem;right:.5rem;
  font-size:.9rem;opacity:.4;
}
.sticker-futura .sticker-status{
  font-size:.62rem;color:rgba(255,255,255,.3);
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase;
}

/* Silueta genérica */
.sticker-silhouette{
  width:60px;height:60px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1.6rem;
  color:rgba(255,255,255,.2);
}

/* ── RESPONSIVE ─────────────────────────────────────────── */
@media(max-width:600px){
  .navbar{padding:.6rem 1rem;}
  .hero{padding:1.5rem 1rem 1.2rem;}
  .album-wrap{padding:1rem 1rem 3rem;}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.5rem;}
  .hero-top{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-left">
    <div class="nav-tienda" id="navTienda">Cargando...</div>
    <div class="nav-region" id="navRegion"></div>
  </div>
  <div class="nav-center" id="navSemana">Semana — de 6</div>
  <div class="nav-right">
    <div class="nav-progress">
      <span class="progress-label">Progreso</span>
      <span class="progress-pct" id="navPct">0%</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <button class="btn-logout" id="btnLogout">Salir</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <div>
        <h1 class="hero-tienda" id="heroTienda"></h1>
        <p class="hero-region" id="heroRegion"></p>
        <p class="hero-fechas" id="heroFechas"></p>
      </div>
      <div class="hero-stats">
        <div class="hstat">
          <div class="hstat-num" id="statDesbloqueados">—</div>
          <div class="hstat-label">Desbloqueados</div>
        </div>
        <div class="hstat">
          <div class="hstat-num" id="statTotal">—</div>
          <div class="hstat-label">Total empleados</div>
        </div>
        <div class="hstat">
          <div class="hstat-num" id="statSemana">—</div>
          <div class="hstat-label">Semana actual</div>
        </div>
        <div class="hstat">
          <div class="hstat-num" id="statPorSemana">—</div>
          <div class="hstat-label">Por semana</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BARRA DE SEMANAS -->
<div class="stats-bar-wrap">
  <div class="stats-bar-inner">
    <span class="stats-bar-label">Ir a semana →</span>
    <div id="statsBar"></div>
  </div>
</div>

<!-- ÁLBUM -->
<div class="album-wrap">
  <div id="albumContainer"></div>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/album.js"></script>
</body>
</html>
