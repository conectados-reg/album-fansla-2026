<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Admin — Álbum Estrellas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --p-blue:#0046AD;--p-navy:#002B6E;--p-orange:#F7A800;--p-red:#E8231A;
  --blanco:#ffffff;--borde:rgba(255,255,255,0.12);--texto-suave:rgba(255,255,255,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  background:linear-gradient(160deg,#001f5e 0%,#05174a 100%);
  color:#fff;font-family:'Barlow',sans-serif;
}

/* NAVBAR */
.navbar{
  position:sticky;top:0;z-index:100;
  background:rgba(0,43,110,.97);backdrop-filter:blur(16px);
  border-bottom:3px solid var(--p-orange);
  padding:.75rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
.nav-brand{
  font-family:'Bebas Neue',sans-serif;font-size:1.4rem;
  letter-spacing:.06em;color:#fff;
}
.nav-badge{
  background:var(--p-red);color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;
  padding:.25rem .75rem;border-radius:20px;margin-left:.6rem;
}
.btn-logout{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.7);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.4rem .9rem;border-radius:20px;cursor:pointer;transition:all .18s;
}
.btn-logout:hover{background:var(--p-red);border-color:var(--p-red);color:#fff;}

/* MAIN */
.main{max-width:1300px;margin:0 auto;padding:2rem 1.5rem 4rem;}

/* HEADER */
.page-header{margin-bottom:2.5rem;}
.page-title{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3rem);
  letter-spacing:.04em;color:#fff;
}
.page-title span{color:var(--p-orange);}
.page-subtitle{
  font-family:'Barlow Condensed',sans-serif;font-size:.75rem;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--texto-suave);margin-top:.4rem;
}

/* STATS GLOBALES */
.global-stats{
  display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem;
}
.gstat{
  background:rgba(255,255,255,.07);border:1px solid var(--borde);
  border-radius:12px;padding:1rem 1.4rem;min-width:120px;flex:1;
}
.gstat-num{
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;
  color:var(--p-orange);line-height:1;
}
.gstat-label{
  font-family:'Barlow Condensed',sans-serif;font-size:.62rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--texto-suave);
  margin-top:.2rem;
}

/* FILTROS */
.filtros{
  display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.5rem;
  align-items:center;
}
.filtros-label{
  font-family:'Barlow Condensed',sans-serif;font-size:.68rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--texto-suave);
  margin-right:.3rem;
}
.filtro-btn{
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.7);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.3rem .8rem;border-radius:20px;cursor:pointer;transition:all .18s;
}
.filtro-btn:hover,.filtro-btn.active{
  background:var(--p-orange);border-color:var(--p-orange);color:#000;
}

/* TABLA TIENDAS */
.stores-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1rem;
}
.store-card{
  background:rgba(255,255,255,.06);border:1px solid var(--borde);
  border-radius:14px;padding:1.2rem;
  transition:border-color .2s,background .2s;cursor:pointer;
  text-decoration:none;color:inherit;display:block;
}
.store-card:hover{
  border-color:rgba(247,168,0,.4);background:rgba(255,255,255,.09);
}
.store-card-top{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:.9rem;
}
.store-codigo{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--p-orange);margin-bottom:.2rem;
}
.store-nombre{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:1rem;letter-spacing:.04em;color:#fff;line-height:1.2;
}
.store-region{
  font-size:.7rem;color:var(--texto-suave);margin-top:.15rem;
}
.store-pct-big{
  font-family:'Bebas Neue',sans-serif;font-size:2rem;
  color:var(--p-orange);line-height:1;text-align:right;
}
.store-pct-label{
  font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--texto-suave);text-align:right;
}

.store-progress-bar{
  width:100%;height:5px;background:rgba(255,255,255,.12);
  border-radius:3px;overflow:hidden;margin-bottom:.7rem;
}
.store-progress-fill{
  height:100%;background:var(--p-orange);border-radius:3px;transition:width .6s ease;
}

.store-footer{
  display:flex;align-items:center;justify-content:space-between;
}
.store-empleados{
  font-family:'Barlow Condensed',sans-serif;font-size:.7rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--texto-suave);
}
.store-semana-badge{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.22rem .65rem;border-radius:20px;
}
.badge-verde{background:rgba(100,210,100,.15);color:#6dd68a;border:1px solid rgba(100,210,100,.3);}
.badge-amarillo{background:rgba(247,168,0,.15);color:var(--p-orange);border:1px solid rgba(247,168,0,.3);}
.badge-gris{background:rgba(255,255,255,.07);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1);}

/* SEMANA INDICATOR en card */
.store-semanas{
  display:flex;gap:.2rem;margin-bottom:.7rem;
}
.sem-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.sem-dot.dot-ok{background:var(--p-orange);}
.sem-dot.dot-actual{background:rgba(247,168,0,.4);border:1.5px solid var(--p-orange);}
.sem-dot.dot-futura{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);}

@media(max-width:600px){
  .main{padding:1rem 1rem 3rem;}
  .global-stats{gap:.6rem;}
}
</style>
</head>
<body>

<nav class="navbar">
  <div>
    <span class="nav-brand">ÁLBUM ESTRELLAS</span>
    <span class="nav-badge">Admin</span>
  </div>
  <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
</nav>

<div class="main">
  <div class="page-header">
    <h1 class="page-title">PANEL DE <span>TIENDAS</span></h1>
    <p class="page-subtitle" id="adminSubtitle">240 tiendas · Semana 2 de 6 · Mundial 2026</p>
  </div>

  <div class="global-stats" id="globalStats"></div>

  <div class="filtros">
    <span class="filtros-label">Filtrar:</span>
    <button class="filtro-btn active" onclick="filtrar('todas',this)">Todas</button>
    <button class="filtro-btn" onclick="filtrar('con-logros',this)">Con logros</button>
    <button class="filtro-btn" onclick="filtrar('sin-logros',this)">Sin logros</button>
  </div>

  <div class="stores-grid" id="storesGrid"></div>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const session = requireAuth(true);
  if (!session) return;

  document.getElementById('btnLogout').addEventListener('click', logout);

  renderGlobalStats();
  renderStores('todas');
});

function renderGlobalStats() {
  const tiendas  = Object.values(TIENDAS).filter(t => !t.esAdmin);
  const totalEmp = tiendas.reduce((s,t) => s + t.totalEmpleados, 0);
  const totalDesbloqueados = tiendas.reduce((s,t) => {
    return s + t.empleados.filter(e => e.cumplioMeta).length;
  }, 0);
  const tiiendasConLogro = tiendas.filter(t => t.empleados.some(e => e.cumplioMeta)).length;

  document.getElementById('globalStats').innerHTML = `
    <div class="gstat"><div class="gstat-num">${tiendas.length}</div><div class="gstat-label">Tiendas (demo)</div></div>
    <div class="gstat"><div class="gstat-num">${totalEmp}</div><div class="gstat-label">Empleados totales</div></div>
    <div class="gstat"><div class="gstat-num">${totalDesbloqueados}</div><div class="gstat-label">Estrellas desbloqueadas</div></div>
    <div class="gstat"><div class="gstat-num">${tiiendasConLogro}</div><div class="gstat-label">Tiendas con logros</div></div>
    <div class="gstat"><div class="gstat-num">${CURRENT_WEEK}/6</div><div class="gstat-label">Semana actual</div></div>
  `;
}

function renderStores(filtro) {
  const tiendas = Object.values(TIENDAS).filter(t => !t.esAdmin);
  const grid    = document.getElementById('storesGrid');

  const filtered = tiendas.filter(t => {
    const ok = t.empleados.filter(e => e.cumplioMeta).length;
    if (filtro === 'con-logros') return ok > 0;
    if (filtro === 'sin-logros') return ok === 0;
    return true;
  });

  if (!filtered.length) {
    grid.innerHTML = '<p style="color:rgba(255,255,255,.4);font-family:Barlow Condensed,sans-serif;letter-spacing:.1em;text-transform:uppercase;">Sin tiendas que mostrar</p>';
    return;
  }

  grid.innerHTML = filtered.map(t => {
    const desb  = t.empleados.filter(e => e.cumplioMeta).length;
    const total = t.totalEmpleados;
    const pct   = Math.round((desb / total) * 100);

    const semDots = SEMANAS.map(s => {
      const ok = t.empleados.filter(e => e.semana === s.numero && e.cumplioMeta).length;
      if (s.estado === 'pasada') return `<div class="sem-dot ${ok > 0 ? 'dot-ok' : 'dot-futura'}"></div>`;
      if (s.estado === 'actual') return `<div class="sem-dot dot-actual"></div>`;
      return `<div class="sem-dot dot-futura"></div>`;
    }).join('');

    const semBadgeClass = pct >= 50 ? 'badge-verde' : pct > 0 ? 'badge-amarillo' : 'badge-gris';
    const semBadgeText  = pct >= 50 ? '✓ Buen ritmo' : pct > 0 ? '▶ En curso' : '— Sin logros';

    return `
      <a class="store-card" href="album.html?tienda=${t.codigo}">
        <div class="store-card-top">
          <div>
            <div class="store-codigo">${t.codigo}</div>
            <div class="store-nombre">${t.nombre}</div>
            <div class="store-region">${t.region}</div>
          </div>
          <div>
            <div class="store-pct-big">${pct}%</div>
            <div class="store-pct-label">progreso</div>
          </div>
        </div>
        <div class="store-semanas">${semDots}</div>
        <div class="store-progress-bar">
          <div class="store-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="store-footer">
          <span class="store-empleados">${desb}/${total} estrellas</span>
          <span class="store-semana-badge ${semBadgeClass}">${semBadgeText}</span>
        </div>
      </a>
    `;
  }).join('');
}

function filtrar(tipo, btn) {
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStores(tipo);
}
</script>
</body>
</html>
